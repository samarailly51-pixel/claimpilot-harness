name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate case packs
        run: python -m claimpilot_harness validate cases

      - name: Check case catalog
        run: python -m claimpilot_harness catalog cases --json

      - name: Run suite smoke test
        run: python -m claimpilot_harness suite cases --agents demo risky --json

      - name: Run suite quality gate smoke test
        run: python -m claimpilot_harness suite cases --agents demo --min-average-score 90 --min-pass-rate 100 --json

      - name: Run traceable arena smoke test
        run: python -m claimpilot_harness arena cases --config benchmarks/baseline-arena.json --out runs/arena --json

      - name: Build demo site
        run: python scripts/build_demo_site.py

      - name: Check demo JavaScript
        run: node --check docs/demo/app.js

      - name: Run demo smoke test
        run: python -m claimpilot_harness run cases/travel-injection-001.json --json
